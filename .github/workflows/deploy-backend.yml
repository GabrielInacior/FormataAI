# =====================================================
# FormataAI Backend — CI/CD para AWS EC2
# =====================================================
# Secrets necessários no GitHub:
#   EC2_HOST          — IP público da EC2 (ex: 3.144.149.164)
#   EC2_USER          — ubuntu
#   EC2_SSH_KEY       — Conteúdo COMPLETO da chave .pem privada
#                       (incluindo -----BEGIN e END-----)
# =====================================================
name: Deploy Backend EC2

on:
  push:
    branches: [main]
    paths:
      - "FormataAIBackend/**"

defaults:
  run:
    working-directory: FormataAIBackend

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FormataAIBackend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  deploy:
    name: Deploy EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/formataai/FormataAI

            # Pull alterações
            git pull origin main

            cd FormataAIBackend

            # Rebuild e restart containers
            docker-compose down --remove-orphans
            docker-compose up -d --build

            # Aguardar container app ficar saudável (até 120s)
            echo "Aguardando container app..."
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Status}}' formataai-backend 2>/dev/null || echo "missing")
              if [ "$STATUS" = "running" ]; then
                echo "Container up após $((i*5))s"
                break
              fi
              if [ "$i" = "24" ]; then
                echo "Timeout aguardando container" && docker-compose logs app --tail=50 && exit 1
              fi
              sleep 5
            done

            # Rodar migrations pendentes
            docker-compose exec -T app npx prisma migrate deploy

            # Limpar imagens antigas
            docker image prune -f

            echo "✅ Deploy concluído!"
