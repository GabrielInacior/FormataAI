# =====================================================
# FormataAI Backend — CI/CD para AWS EC2
# =====================================================
# Secrets necessários no GitHub:
#   EC2_HOST          — IP público da EC2 (ex: 3.12.209.26)
#   EC2_USER          — ubuntu
#   EC2_SSH_KEY       — Conteúdo completo da chave privada ed25519
#                       (-----BEGIN OPENSSH PRIVATE KEY----- ... -----END-----)
# =====================================================
name: Deploy Backend EC2

on:
  push:
    branches: [main]
    paths:
      - "FormataAIBackend/**"

env:
  SSH_HOST: ${{ secrets.EC2_HOST }}
  SSH_PORT: 22
  SSH_USER: ${{ secrets.EC2_USER }}

defaults:
  run:
    working-directory: FormataAIBackend

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FormataAIBackend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  deploy:
    name: Deploy EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        shell: bash
        run: |
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'ENDSSH'
            set -e
            cd /opt/formataai/FormataAI

            # Pull alterações
            git pull origin main

            cd FormataAIBackend

            # Rebuild e restart containers
            docker-compose down --remove-orphans
            docker-compose up -d --build

            # Aguardar container app ficar saudável (até 120s)
            echo "Aguardando container app..."
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Status}}' formataai-backend 2>/dev/null || echo "missing")
              if [ "$STATUS" = "running" ]; then
                echo "Container up após $((i*5))s"
                break
              fi
              if [ "$i" = "24" ]; then
                echo "Timeout aguardando container"
                docker-compose logs app --tail=50
                exit 1
              fi
              sleep 5
            done

            # Rodar migrations pendentes
            docker-compose exec -T app npx prisma migrate deploy

            # Limpar imagens antigas
            docker image prune -f

            echo "Deploy concluido!"
          ENDSSH

